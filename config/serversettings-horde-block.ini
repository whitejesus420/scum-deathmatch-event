; =====================================================================
;  SCUM COD-Zombies Deathmatch — Layer 1: the GLOBAL baseline
;  Merge these keys into your server's ServerSettings.ini, then RESTART.
;
;  WHAT THIS FILE IS (read this — the design changed):
;  The horde is spawned AT THE ARENA by an RCON loop (Layer 1b,
;  tools/arena_horde_loop.py), NOT by cranking SCUM's server-wide
;  Encounter Manager. Every Encounter/Horde/Puppet setting below is held
;  at (or near) its VANILLA default ON PURPOSE. SCUM has no per-location
;  density knob; cranking these globals would heat up the WHOLE map, which
;  is exactly what we do NOT want. So this block's job is the opposite of a
;  crank: it is a "keep the rest of the map normal" guard plus the PvP gate.
;
;  The ONLY deliberate non-default here is MaxAllowedPuppets (a ceiling, not
;  a spawner — see its note). Everything else = vanilla.
;
;  If you are tempted to raise any multiplier below to "make the horde
;  bigger" — DON'T. Make COUNT_PER_WAVE / INTERVAL_SECONDS bigger in
;  tools/arena_horde_loop.py instead. That keeps the action at the arena.
;  tools/validate_horde_block.py enforces this (a cranked global ERRORs).
;
;  FILE STYLE: dedicated-server / host-panel files write each key with a
;  "scum." prefix under a [World] section (shown below). If YOUR server's
;  generated file instead uses bracketed section headers like
;  [SCUM.WorldSettings] with BARE keys, drop the "scum." prefix on every
;  line and place them under that section. Same settings, two renderings.
;
;  BOOLEANS are written as 0/1 (NOT True/False).
;  RESTART: these are read at world load — restart after editing.
;
;  RANGES in comments are from server-settings.com (single source) — verify
;  the real clamp on your live build via docs/live-verification-handoff.md.
; =====================================================================
[World]

; Global puppet CAP — a ceiling, not a spawner. It does NOT itself create any
; puppets; it only sets how many may exist at once. Kept above default so the
; arena loop has headroom for a real crowd without the engine refusing spawns.
; Raise it if the arena loop can't reach COUNT_PER_WAVE; otherwise leave it.
; default -1 (engine default)  range -1..1024
scum.MaxAllowedPuppets=512

; --- Everything below is held at VANILLA so the open map stays normal. ---

; Server-wide horde activation chance. VANILLA. (Old design cranked this to
; 10000 to light up the whole map — reverted.)  default 1.0  range 0..10000
scum.EncounterHordeActivationChanceMultiplier=1.0

; Global scream/noise -> horde trigger. -1 = DISABLED. We do NOT want gunfire
; anywhere on the map to summon a wave; the arena loop spawns the horde
; directly instead.  default -1  range -1..100
scum.EncounterHordePuppetHordeActivationScreamOverrideChance=-1

; Base size of standalone hordes. VANILLA.  default 1.0  range 0..3
scum.EncounterHordeBaseCharacterAmountMultiplier=1.0

; Base size of GROUPED hordes (a separate real key). VANILLA.  default 1.0  range 0..3
scum.EncounterHordeGroupBaseCharacterAmountMultiplier=1.0

; How far from players hordes may spawn. VANILLA.  default 1.0  range 0..10
scum.EncounterHordeSpawnDistanceMultiplier=1.0

; Time between encounter-character respawns. VANILLA.  default 1.0  range 0..100
scum.EncounterCharacterRespawnTimeMultiplier=1.0

; How many respawn per batch. VANILLA.  default 1.0  range 0..3
scum.EncounterCharacterRespawnBatchSizeMultiplier=1.0

; Global aggressive-spawn override. -1 = DISABLED (use engine default). We are
; not making the whole map's puppets hostile-on-sight; arena puppets are spawned
; aggressive enough by type/count.  default -1  range -1..100
scum.EncounterCharacterAggressiveSpawnChanceOverride=-1

; Puppet HP. VANILLA. Difficulty is ARENA-ONLY now — get tanky enemies by
; spawning tougher puppet TYPE IDs in the loop, not by buffing every puppet on
; the map.  default 1.0  range 0.01..100
scum.PuppetHealthMultiplier=1.0

; Puppet run speed. VANILLA, same reason as HP — no map-wide sprinters.
; default 1.0  range 0.5..2.0
scum.PuppetRunningSpeedMultiplier=1.0

; Low-player-count "keep full hordes" mode. OFF — leaving it on would keep the
; WHOLE map dense when few players are on. default 0 (off)  range 0/1
scum.EnableEncounterManagerLowPlayerCountMode=0

; Let the server recycle distant low-priority NPCs so spawns never stall.
; Engine default, harmless, helps the arena loop reclaim its budget. 1 = on.
; default 1 (on)  range 0/1
scum.EncounterCanRemoveLowPriorityCharacters=1

; ---------------------------------------------------------------------
;  PvP GATE (not a horde key, but REQUIRED for the arena to be lethal):
;  the arena's per-zone Allow flags CANNOT re-enable PvP if the global
;  human-vs-human damage multiplier is 0. Make sure your ServerSettings.ini
;  has it ABOVE 0 (e.g. 1.0) and that ServerPlaystyle is NOT PVE.
;  Read the exact current key name off your live file — SCUM renames it
;  between patches (e.g. HumanToHumanDamageMultiplier or a melee/ranged split).
; ---------------------------------------------------------------------
